<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito in Costruzione</title>
    <style>
        /* Stili generali della pagina */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #333;
        }

        /* Contenitore principale */
        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 85%;
        }

        /* Icona animata */
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: spin 4s linear infinite;
        }

        /* Testi */
        h1 {
            margin: 0;
            font-size: 2.5em;
            color: #2c3e50;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1em;
            color: #666;
            margin-top: 15px;
            line-height: 1.6;
        }

        /* Barra di caricamento animata */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-top: 35px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background-color: #3498db;
            border-radius: 4px;
            animation: load 2s infinite alternate ease-in-out;
        }

        /* Animazioni */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes load {
            0% { width: 20%; }
            100% { width: 80%; }
        }
        
        /* Adattamento per schermi piccoli */
        @media (max-width: 480px) {
            h1 { font-size: 2em; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⚙️</div>
        <h1>Work in Progress</h1>
        <p>Stiamo lavorando al nostro nuovo sito web per offrirti un'esperienza fantastica. Torna a trovarci presto!</p>
        
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

</body>
</html>
